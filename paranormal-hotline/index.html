<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#101114">
<title>Paranormal Hotline</title>
<style>
:root{color-scheme:dark;font-family:Arial,Helvetica,sans-serif;background:#101114;color:#f6f1df}*{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;background:radial-gradient(circle at top left,rgba(36,158,112,.35),transparent 34rem),linear-gradient(145deg,#101114 0%,#242a32 54%,#141618 100%)}.app{width:min(100%,34rem);padding:1rem}.phone{min-height:min(42rem,calc(100vh - 2rem));display:flex;flex-direction:column;justify-content:center;gap:1rem;padding:1.25rem;text-align:center}.eyebrow{margin:0;color:#84e0b0;font-size:.85rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}h1{margin:0;font-size:clamp(2rem,10vw,4.5rem);line-height:1}#caption{min-height:3.4rem;margin:0 auto;max-width:27rem;color:#d7d2c3;font-size:1.2rem;line-height:1.4}button{border:0;color:inherit;font:inherit;cursor:pointer}.call-button{width:min(68vw,13rem);aspect-ratio:1;margin:1rem auto;border-radius:50%;background:#1fb46a;color:#07130c;font-size:clamp(1.35rem,7vw,2.3rem);font-weight:800;box-shadow:0 1rem 3rem rgba(31,180,106,.32)}.call-button.listening{background:#f4c84f;box-shadow:0 1rem 3rem rgba(244,200,79,.3)}.call-button.connected{background:#e85a4f;box-shadow:0 1rem 3rem rgba(232,90,79,.28)}.controls{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.7rem}.controls button{min-height:3.25rem;border-radius:.5rem;padding:.7rem;background:rgba(255,255,255,.11);color:#f6f1df;font-weight:700}.toggle{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;color:#d7d2c3;font-size:.95rem}.toggle input{width:1.2rem;height:1.2rem;accent-color:#1fb46a}.voice-control{display:grid;gap:.4rem;color:#d7d2c3;font-size:.9rem;text-align:left}.voice-control select{width:100%;min-height:2.75rem;border:1px solid rgba(255,255,255,.16);border-radius:.5rem;padding:0 .7rem;background:rgba(0,0,0,.28);color:#f6f1df;font:inherit}@media(max-width:26rem){.controls{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="app" aria-label="Paranormal response hotline"><section class="phone" aria-live="polite"><p class="eyebrow">Paranormal Hotline</p><h1 id="status">Ready to call</h1><p id="caption">Tap call, then tell the crew what you hear.</p><button id="callButton" class="call-button" type="button"><span id="callIcon">Call</span></button><div class="controls" aria-label="Quick prompts"><button type="button" data-prompt="I still hear something.">I still hear it</button><button type="button" data-prompt="There is a ghost in the hallway.">Hallway ghost</button><button type="button" data-prompt="It made a spooky noise.">Spooky noise</button><button type="button" data-prompt="We caught it.">We caught it</button></div><label class="toggle"><input id="autoListen" type="checkbox" checked><span>Listen after each answer</span></label><label class="voice-control"><span>Voice</span><select id="voiceSelect" aria-label="Voice"></select></label></section></main>
<script>
const statusText=document.querySelector('#status'),caption=document.querySelector('#caption'),callButton=document.querySelector('#callButton'),callIcon=document.querySelector('#callIcon'),autoListen=document.querySelector('#autoListen'),voiceSelect=document.querySelector('#voiceSelect'),promptButtons=document.querySelectorAll('[data-prompt]');
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition,recognition=SpeechRecognition?new SpeechRecognition():null;
const intros=['Paranormal Hotline. This is dispatch. Okay, tell me what is happening.','Ghost watch is online. Take a breath, tiny investigators. What do you hear?','Spooky-response desk. We have the meters warmed up. Go ahead with your report.'];
const generic=['Okay, copy that. Everybody freeze like statues and listen for three seconds. If it goes boo again, point your flashlights low.','Good report. I am sending the jump-pack team to your room. Check behind the couch, but use your brave walking feet.','Hmm. The ghost may be looking for snacks. Say hello in your serious voice and ask it to wiggle the curtains.','Confirmed. I hear suspicious whooshing on the scanner. March three steps, spin once, and tell me if the ghost moved.','Nice work. Hold your pretend trap open and count down from five. I will start the capture hum.'];
const hallway=['Hallway ghost confirmed. Stand at the doorway, shine your light at the floor, and say, this hallway is closed for ghost business.','Copy hallway activity. The echo meter says it is halfway between silly and spooky. Walk together and check the corners.','Alright, hallway team. Look left, look right, then whisper, no sneaky ghosts allowed past this point.'];
const noise=['Spooky noise logged. That was a class three creaker. Tap the wall twice and ask it to use its indoor boo.','I heard that on the sound scanner. Everyone make your best tiny siren noise, then listen for where it answers.','Yep, I caught that. It sounds like a furniture squeak with ghost manners. Check under the nearest blanket.'];
const still=['Still hearing it. Got it. Move toward the sound very slowly and tell me if it gets louder or sillier.','The ghost is being stubborn. Switch to whisper mode, sneak two steps closer, and keep the pretend trap ready.','Okay, stay on the line with me. Point to where the sound came from, then give me one very serious nod.'];
const caught=['Outstanding. Trap is sealed. Please give the ghost one polite goodbye and place the trap somewhere extremely official.','Capture complete. The spooky meter is back to normal. High fives for the whole field team.'];
const repeat=['I am still here. Tell me what the ghost is doing now.','Field team standing by. Give me the next spooky update.','Scanner is listening. Report any boo, bump, whoosh, or suspicious giggle.'];
let connected=false,listening=false,responding=false,lastReply='',voices=[];
loadVoices();speechSynthesis.addEventListener('voiceschanged',loadVoices);voiceSelect.addEventListener('change',()=>localStorage.setItem('hotlineVoice',voiceSelect.value));
if(recognition){recognition.lang='en-US';recognition.interimResults=false;recognition.continuous=false;recognition.addEventListener('result',e=>{const t=e.results[0][0].transcript;caption.textContent='"'+t+'"';answer(t)});recognition.addEventListener('end',()=>{listening=false;updateButton();if(connected&&!responding&&!speechSynthesis.speaking&&autoListen.checked)setTimeout(startListening,800)});recognition.addEventListener('error',()=>{listening=false;statusText.textContent='Use quick prompts';caption.textContent='The microphone did not connect, but the hotline still works with the buttons.';updateButton()})}
callButton.addEventListener('click',()=>{if(!connected)return connectCall();listening?stopListening():startListening()});
promptButtons.forEach(b=>b.addEventListener('click',()=>{if(!connected)connectCall(false);caption.textContent=b.dataset.prompt;answer(b.dataset.prompt)}));
function connectCall(announce=true){connected=true;statusText.textContent='Connected';updateButton();announce?speak(pick(intros),()=>{if(autoListen.checked)startListening()}):setTimeout(startListening,250)}
function startListening(){if(!recognition){statusText.textContent='Tap a prompt';caption.textContent='This browser cannot listen through the microphone, so use the quick prompts.';return}if(speechSynthesis.speaking)return;try{listening=true;statusText.textContent='Listening';caption.textContent='Tell the hotline what the ghost is doing.';updateButton();recognition.start()}catch{listening=false;updateButton()}}
function stopListening(){if(!recognition)return;recognition.stop();listening=false;updateButton()}
function answer(input){responding=true;stopListening();const reply=chooseReply(input);statusText.textContent='Hotline says';caption.textContent=reply;speak(reply,()=>{statusText.textContent='Connected';if(connected&&autoListen.checked)startListening()})}
function chooseReply(input){const text=input.toLowerCase();let pool=generic;if(text.includes('hall')||text.includes('stairs')||text.includes('door'))pool=hallway;else if(text.includes('noise')||text.includes('sound')||text.includes('boo')||text.includes('creak'))pool=noise;else if(text.includes('still')||text.includes('again')||text.includes('hear'))pool=still;else if(text.includes('caught')||text.includes('trap')||text.includes('got it'))pool=caught;else if(text.includes('hello')||text.includes('there'))pool=repeat;let reply=pick(pool);if(reply===lastReply&&pool.length>1)reply=pick(pool.filter(x=>x!==lastReply));lastReply=reply;return reply}
function speak(text,onDone){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(humanize(text));u.rate=.88;u.pitch=.92;u.volume=1;const v=getSelectedVoice()||getBestVoice();if(v)u.voice=v;u.addEventListener('end',()=>{responding=false;if(typeof onDone==='function')onDone()});u.addEventListener('error',()=>{responding=false;if(typeof onDone==='function')onDone()});speechSynthesis.speak(u)}
function humanize(text){const openers=['Okay. ','Alright. ','Copy that. ','Got it. ',''];return /^(Okay|Alright|Copy|Got it|Good|Confirmed|Outstanding|Capture)/i.test(text)?text:pick(openers)+text}
function loadVoices(){voices=speechSynthesis.getVoices().filter(v=>v.lang.toLowerCase().startsWith('en')).sort((a,b)=>scoreVoice(b)-scoreVoice(a));voiceSelect.innerHTML='';voiceSelect.add(new Option('Best available','auto'));voices.forEach((v,i)=>voiceSelect.add(new Option(v.name+' ('+v.lang+')',String(i))));voiceSelect.value=localStorage.getItem('hotlineVoice')||'auto'}
function getSelectedVoice(){return voiceSelect.value==='auto'?null:voices[Number(voiceSelect.value)]||null}function getBestVoice(){return voices[0]||null}function scoreVoice(v){let s=0;if(/premium|enhanced|neural|natural|samantha|alex|daniel|jamie|google|microsoft/i.test(v.name))s+=5;if(/us|gb|au/i.test(v.lang))s+=2;if(v.localService)s+=1;return s}function pick(a){return a[Math.floor(Math.random()*a.length)]}function updateButton(){callButton.classList.toggle('connected',connected&&!listening);callButton.classList.toggle('listening',listening);callIcon.textContent=!connected?'Call':listening?'Listening':'Talk'}
</script>
</body>
</html>
